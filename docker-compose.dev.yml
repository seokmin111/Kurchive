services:
  mysql:
    image: mysql:8.0
    container_name: kurchive-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: BE/Dockerfile
    container_name: kurchive-backend-dev
    restart: always
    depends_on:
      - mysql
    env_file:
      - .dev.env
    environment:
      DATABASE_URL: "mysql+aiomysql://devuser:kurchive202508%21@mysql:3306/kurchive"
    ports:
      - "8000:8000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./BE:/app/BE   # 코드 수정하면 바로 반영 (핫리로드)
    command: >
      python -m uvicorn BE.src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data_dev:
