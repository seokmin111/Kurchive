version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: kurchive-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - kurchive-net

volumes:
  mysql_data_dev:

networks:
  kurchive-net:
    driver: bridge
