services:
  mysql:
    image: mysql:8.0
    container_name: kurchive-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: BE/Dockerfile
    image: kurchive_backend:latest
    container_name: kurchive-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql+aiomysql://devuser:kurchive202508%21@kurchive-mysql:3306/kurchive"
    expose:
      - "8000"
    volumes:
      - /home/ubuntu/Kurchive/wait-for-mysql.sh:/app/wait-for-mysql.sh
      - ./static/uploads:/app/static/uploads
      - /home/ubuntu/.oci:/root/.oci
    command: ["sh", "/app/wait-for-mysql.sh", "python", "-m", "uvicorn", "BE.src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  nginx:
    image: nginx:latest
    container_name: kurchive-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static/uploads:/app/static/uploads

volumes:
  mysql_data: