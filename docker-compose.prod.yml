services:
  mysql:
    image: mysql:8.0
    container_name: kurchive-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: 
      context: .
      dockerfile: BE/Dockerfile
    image: kurchive_backend:latest
    container_name: kurchive-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql+aiomysql://devuser:kurchive202508%21@mysql:3306/kurchive"
    ports:
      - "8000:8000"
    volumes:
        - /home/ubuntu/Kurchive/wait-for-mysql.sh:/app/wait-for-mysql.sh
        - ./static/uploads:/app/static/uploads
        - /home/ubuntu/.oci:/root/.oci

    command: ["sh", "/app/wait-for-mysql.sh", "python", "-m", "uvicorn", "BE.src.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  mysql_data:
