<!DOCTYPE html>
<html lang="ko">
	<head>
		<link rel="stylesheet" href = "./[osm]recipe_explain.css">
        <meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content = "IE-edge">
		<meta name ="viewport" content = "width=device-width, initial-scale = 1.0">
		<title>커카이브 : 레시피 아카이브</title>
    </head>
    <body>
        <div class = 'header'>

        </div>
        <div>
            <form class = 'search-container' action = "#" method = "get"> <!--검색어 보낼 주소 입력-->

            </form>
        </div>
        <div class="button-wrapper">
            <button class="back-btn">&lt;<br>메인화면으로 <br> 돌아가기</button>
            <button class="ivory-btn">레시피 아카이빙 하기</button>
        </div>
        <div class = "recipe-container"> <!--최근 등록된 레시피들-->

            <div class = "recipe-item">item-2</div>
            <div class = "recipe-item">item-3</div>
            <div class = "recipe-item">item-4</div>
            <div class = "recipe-item">item-5</div>
            <div class = "recipe-item">item-6</div>
            <div class = "recipe-item">item-7</div>
            <div class = "recipe-item">item-8</div>
            <div class = "recipe-item">item-9</div>

        </div>
        <div class = "footer"></div>
